# Terminal setup
set -ga terminal-overrides ",screen-256color*:Tc"
set-option -g default-terminal "screen-256color"
set -s escape-time 0

# Status bar style
set -g status-style 'bg=#ffdd33 fg=#000000'

# Reload configuration
bind r source-file ~/.tmux.conf
set -g base-index 1

# Turn the mouse on
set -g mouse on

# Vim-like copy mode
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
if-shell 'command -v pbcopy >/dev/null 2>&1' {
  bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'
} {
  if-shell 'command -v wl-copy >/dev/null 2>&1' {
    bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'wl-copy'
  } {
    if-shell 'command -v xclip >/dev/null 2>&1' {
      bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
    } {
      if-shell 'command -v xsel >/dev/null 2>&1' {
        bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xsel --clipboard --input'
      } {
        bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
      }
    }
  }
}

# Vim-like pane switching
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Sessionizer
bind-key -r f run-shell "tmux neww bash ~/scripts/tmux-sessionizer.sh"

# Resurrect
set -g @resurrect-processes 'bash zsh "~pwsh->pwsh.exe" nvim btop'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'
